name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l {0}

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ".test-conda-env.yml"
          activate-environment: "actx-dgfem-env"
          auto-activate-base: false
          auto-update-conda: true

      - name: Install actx_dgfem_suite
        run: pip install .

      - name: Run ruff
        run: ruff check

  basedpyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ".test-conda-env.yml"
          activate-environment: "actx-dgfem-env"
          auto-activate-base: false
          auto-update-conda: true

      - name: Install actx_dgfem_suite
        run: pip install .

      - name: Run basedpyright
        run: basedpyright

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ".test-conda-env.yml"
          activate-environment: "actx-dgfem-env"
          auto-activate-base: false
          auto-update-conda: true

      - name: Install actx_dgfem_suite
        run: pip install .

      - name: Run pytest
        run: |
          cd test
          pytest -v .

  tiny_operator_generate:
    runs-on: ubuntu-latest
    env:
      JAX_ENABLE_X64: "1"
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ".test-conda-env.yml"
          activate-environment: "actx-dgfem-env"
          auto-activate-base: false
          auto-update-conda: true

      - name: Install actx_dgfem_suite
        run: pip install .

      - name: Generate tiny operators
        run: |
          python -m actx_dgfem_suite.suite_generators \
            --equations tiny_euler,tiny_maxwell,tiny_wave \
            --dims 2,3 \
            --degrees 1,2,3,4

  tiny_operator_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: ["", "-O"]
        equation: ["tiny_euler", "tiny_maxwell", "tiny_wave"]
    env:
      JAX_ENABLE_X64: "1"
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ".test-conda-env.yml"
          activate-environment: "actx-dgfem-env"
          auto-activate-base: false
          auto-update-conda: true

      - name: Install actx_dgfem_suite
        run: pip install .

      - name: Execute tiny operators
        run: |
          python ${{ matrix.optimize }} -m actx_dgfem_suite.run \
            --equations ${{ matrix.equation }}  \
            --dims 2,3 \
            --degrees 1,2,3,4 \
            --actxs "pyopencl,jax:jit,pytato:dgfem_opt"
