name: actx-dgfem-env
channels:
- conda-forge
- nodefaults

dependencies:
- python=3
- pocl # replace with ocl-icd for system ICD loaders
- pyopencl
- jax
- jaxlib # replace with `jaxlib=*=*cuda*` for gpu builds
- pip
- pytest
- basedpyright
- ruff
- pip:
    - git+https://github.com/inducer/pymbolic.git
    - git+https://github.com/inducer/loopy.git
    - git+https://github.com/inducer/pytato.git@indirection_pusher
    - git+https://github.com/inducer/arraycontext.git
    - git+https://github.com/inducer/meshmode.git
    - git+https://github.com/inducer/modepy.git
    - git+https://github.com/inducer/grudge.git
    - git+https://github.com/kaushikcfd/feinsum.git
    - "dvc[http,s3]"
